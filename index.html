<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>Ativação de Sinal | Starlink Residencial & Móvel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f8fafc', 100: '#f1f5f9', 500: '#0ea5e9',
                            600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e',
                        },
                        chatbg: '#0b1329'
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(0,0,0,0.3)',
                        'glow': '0 0 20px rgba(14, 165, 233, 0.4)'
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { background-color: #0b0f19; min-height: 100dvh; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .chat-bg-pattern {
            background: linear-gradient(rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.96)), 
                        url("https://images.unsplash.com/photo-1518364538800-6bcb3f25da49?q=80&w=1470&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
        }

        .msg-enter { opacity: 0; transform: translateY(20px) scale(0.95); animation: slideUpBubble 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideUpBubble { to { opacity: 1; transform: translateY(0) scale(1); } }

        .bubble-bot { position: relative; border-top-left-radius: 0; background-color: #1e293b; color: #f8fafc; }
        .bubble-bot::before { content: ''; position: absolute; top: 0; left: -8px; width: 0; height: 0; border-top: 8px solid #1e293b; border-left: 8px solid transparent; }
        
        .bubble-user { position: relative; border-top-right-radius: 0; background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .bubble-user::before { content: ''; position: absolute; top: 0; right: -8px; width: 0; height: 0; border-top: 8px solid #0369a1; border-right: 8px solid transparent; }

        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 12px 16px; background: #1e293b; border-radius: 18px; width: fit-content; }
