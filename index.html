<script>
        const APP_CONFIG = {
            botName: "Ana",
            botAvatar: "https://dinellycontabilidade.com.br/wp-content/uploads/2023/07/saiba-quais-sao-os-canais-oficiais-para-atendimento-do-inss.jpg",
            taxaJurosMensal: 0.0145, 
            whatsapp: "5528999055745"
        };

        // Estado inicial ampliado
        let state = {
            step: 0,
            isTyping: false,
            data: { perfil: '', objetivo: '', valor: 5000, prazo: 84, nome: '', cpf: '', celular: '', banco: '', formaRecebimento: '' }
        };

        const messagesList = document.getElementById('messages-list');
        const chatContainer = document.getElementById('chat-container');
        const inputForm = document.getElementById('input-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const errorTooltip = document.getElementById('error-tooltip');
        const errorText = document.getElementById('error-text');
        
        let currentResolve = null;
        let currentValidator = null;
        let currentMask = null;

        const sleep = ms => new Promise(res => setTimeout(res, ms));
        const getTime = () => {
            const now = new Date();
            return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        };
        const formatMoney = val => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight + 1000, behavior: 'smooth' });
                window.scrollTo({ top: document.documentElement.scrollHeight + 1000, behavior: 'smooth' });
            }, 100);
        }

        function createBotMessageHTML(text, extraContent = '') {
            const time = getTime();
            const parsedText = text.replace(/\*\*(.*?)\*\//g, '<strong>$1</strong>');
            return `
                <div class="flex gap-2 w-full max-w-[95%] md:max-w-[85%] msg-enter mb-2">
                    <img src="${APP_CONFIG.botAvatar}" class="w-8 h-8 rounded-full shadow-sm shrink-0 mt-auto mb-1 border border-gray-200">
                    <div class="flex flex-col gap-1 min-w-0">
                        <div class="bg-white text-slate-800 p-3.5 rounded-2xl bubble-bot shadow-sm border border-gray-100 text-[15px] leading-relaxed relative">
                            ${parsedText}
                            <div class="text-[10px] text-slate-400 text-right mt-1.5 float-right ml-3">${time}</div>
                        </div>
                        ${extraContent}
                    </div>
                </div>
            `;
        }

        function createUserMessageHTML(text) {
            const time = getTime();
            return `
                <div class="flex justify-end w-full msg-enter mb-2">
                    <div class="flex flex-col items-end gap-1 max-w-[95%] md:max-w-[85%]">
                        <div class="text-white p-3.5 rounded-2xl bubble-user shadow-md text-[15px] leading-relaxed relative">
                            ${text}
                            <div class="text-[10px] text-blue-200 text-right mt-1 flex items-center justify-end gap-1 float-right ml-3">
                                ${time} <i class="ph-bold ph-checks text-white"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function showTyping(duration) {
            state.isTyping = true;
            document.querySelector('header h2 + p span:first-child').innerText = 'Digitando';
            document.getElementById('typing-dots').classList.remove('hidden');
            document.getElementById('typing-dots').classList.add('flex');

            const id = 'typing-' + Date.now();
            const html = `
                <div id="${id}" class="flex gap-2 w-full max-w-[90%] msg-enter mb-2">
                    <img src="${APP_CONFIG.botAvatar}" class="w-8 h-8 rounded-full shadow-sm shrink-0 mt-auto mb-1 border border-gray-200">
                    <div class="typing-indicator bubble-bot">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>`;
            messagesList.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
            await sleep(duration);
            document.getElementById(id)?.remove();
            state.isTyping = false;
            document.querySelector('header h2 + p span:first-child').innerText = 'Online';
            document.getElementById('typing-dots').classList.add('hidden');
            document.getElementById('typing-dots').classList.remove('flex');
        }

        async function sendBotMessage(text, extraContent = '', typingTime = 1200) {
            await showTyping(typingTime);
            messagesList.insertAdjacentHTML('beforeend', createBotMessageHTML(text, extraContent));
            scrollToBottom();
            await sleep(400);
        }

        async function handleUserSelection(value, displayLabel, key) {
            document.querySelectorAll('.options-group button').forEach(b => { b.disabled = true; if(b.dataset.val !== value) b.classList.add('opacity-40'); });
            if(key) state.data[key] = value;
            messagesList.insertAdjacentHTML('beforeend', createUserMessageHTML(displayLabel || value));
            scrollToBottom();
            state.step++;
            executeStep();
        }

        function showError(msg) {
            errorText.innerText = msg;
            errorTooltip.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => errorTooltip.classList.add('opacity-0', 'pointer-events-none'), 3000);
        }

        function waitForInput(key, type, placeholder, validatorFn, errorMsg, maskFn = null) {
            userInput.disabled = false; sendBtn.disabled = false; userInput.type = type; userInput.placeholder = placeholder; userInput.value = ''; userInput.focus();
            currentValidator = { fn: validatorFn, msg: errorMsg }; currentMask = maskFn;
            return new Promise(resolve => {
                currentResolve = (val) => {
                    userInput.disabled = true; sendBtn.disabled = true; userInput.value = ''; userInput.placeholder = 'Aguarde...';
                    state.data[key] = val; 
                    messagesList.insertAdjacentHTML('beforeend', createUserMessageHTML(val)); 
                    scrollToBottom(); 
                    resolve();
                };
            });
        }

        inputForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if(!currentResolve) return;
            const val = userInput.value.trim();
            if(currentValidator && !currentValidator.fn(val)) { showError(currentValidator.msg); return; }
            const resolveFn = currentResolve; currentResolve = null; currentValidator = null; currentMask = null;
            resolveFn(val); state.step++; executeStep();
        });

        userInput.addEventListener('input', (e) => { if(currentMask) e.target.value = currentMask(e.target.value); });

        const maskCPF = v => { v = v.replace(/\D/g,""); v = v.replace(/(\d{3})(\d)/,"$1.$2"); v = v.replace(/(\d{3})(\d)/,"$1.$2"); v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2"); return v.substring(0, 14); };
        const maskPhone = v => { v = v.replace(/\D/g,""); v = v.replace(/^(\d{2})(\d)/g,"($1) $2"); v = v.replace(/(\d)(\d{4})$/,"$1-$2"); return v.substring(0, 15); };
        const validarCPF = cpf => { cpf = cpf.replace(/[^\d]+/g,''); if(cpf == '' || cpf.length != 11 || /^(\d)\1{10}$/.test(cpf)) return false; return true; };

        function calcPmt(pv, n) { 
            const i = APP_CONFIG.taxaJurosMensal; 
            const pmt = pv * (i * Math.pow(1 + i, n)) / (Math.pow(1 + i, n) - 1); 
            return formatMoney(pmt); 
        }

        window.adjustSimValue = function(amount) { 
            const slider = document.getElementById('sim-range'); 
            let current = parseInt(slider.value); 
            let newVal = current + amount; 
            if(newVal > parseInt(slider.max)) newVal = parseInt(slider.max); 
            if(newVal < parseInt(slider.min)) newVal = parseInt(slider.min); 
            slider.value = newVal; 
            updateCalcDisplay(newVal); 
        };

        window.updateCalcDisplay = function(val) { 
            state.data.valor = parseInt(val); 
            document.getElementById('sim-val-display').innerText = formatMoney(state.data.valor); 
            document.getElementById('sim-pmt-display').innerText = calcPmt(state.data.valor, state.data.prazo); 
        };

        window.setSimPrazo = function(btn, prazo) { 
            document.querySelectorAll('.term-selector').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
            state.data.prazo = prazo; 
            document.getElementById('sim-pmt-display').innerText = calcPmt(state.data.valor, state.data.prazo); 
        };

        window.confirmSimulation = function() { 
            document.getElementById('sim-btn-confirm').disabled = true; 
            document.getElementById('sim-btn-confirm').innerText = 'Confirmado'; 
            document.getElementById('sim-range').disabled = true; 
            messagesList.insertAdjacentHTML('beforeend', createUserMessageHTML(`Quero ${formatMoney(state.data.valor)} em ${state.data.prazo}x`)); 
            scrollToBottom(); 
            state.step++; 
            executeStep(); 
        };

        function renderSimulatorCard() {
            const html = `
                <div class="bg-white border border-blue-100 rounded-2xl shadow-sm overflow-hidden w-full max-w-[280px] mt-1 msg-enter">
                    <div class="bg-blue-50/70 p-4 border-b border-blue-100 text-center">
                        <p class="text-xs font-semibold text-blue-600 uppercase tracking-wider mb-1">Valor Desejado</p>
                        <h3 class="text-2xl font-black text-slate-800" id="sim-val-display">${formatMoney(state.data.valor)}</h3>
                    </div>
                    <div class="p-4 space-y-5">
                        <div class="flex items-center gap-2">
                            <button type="button" onclick="adjustSimValue(-500)" class="btn-adj"><i class="ph-bold ph-minus"></i></button>
                            <input type="range" id="sim-range" min="1000" max="50000" step="500" value="${state.data.valor}" oninput="updateCalcDisplay(this.value)" class="flex-1">
                            <button type="button" onclick="adjustSimValue(500)" class="btn-adj"><i class="ph-bold ph-plus"></i></button>
                        </div>
                        <div>
                            <p class="text-xs font-semibold text-slate-500 mb-2">Prazo (meses)</p>
                            <div class="grid grid-cols-4 gap-2">
                                <button type="button" onclick="setSimPrazo(this, 36)" class="term-selector py-2 rounded-lg text-xs font-bold text-slate-600 bg-slate-50">36x</button>
                                <button type="button" onclick="setSimPrazo(this, 48)" class="term-selector py-2 rounded-lg text-xs font-bold text-slate-600 bg-slate-50">48x</button>
                                <button type="button" onclick="setSimPrazo(this, 72)" class="term-selector py-2 rounded-lg text-xs font-bold text-slate-600 bg-slate-50">72x</button>
                                <button type="button" onclick="setSimPrazo(this, 84)" class="term-selector active py-2 rounded-lg text-xs font-bold text-slate-600 bg-slate-50">84x</button>
                            </div>
                        </div>
                        <div class="bg-gray-50 rounded-xl p-3 flex justify-between items-center border border-gray-100">
                            <span class="text-xs font-medium text-slate-500">Parcela Estimada</span>
                            <span class="text-base font-bold text-emerald-600" id="sim-pmt-display">${calcPmt(state.data.valor, state.data.prazo)}</span>
                        </div>
                        <button type="button" id="sim-btn-confirm" onclick="confirmSimulation()" class="w-full bg-brand-600 text-white font-bold py-3 rounded-xl hover:bg-brand-700 transition-colors shadow-md text-sm">Simular Agora</button>
                    </div>
                </div>
            `;
            return html;
        }

        async function executeStep() {
            switch(state.step) {
                case 0:
                    await sendBotMessage("Olá! Sou a **Ana**, especialista financeira do Portal Consignado. 👋", '', 1000);
                    await sendBotMessage("Meu objetivo é liberar o seu crédito o mais rápido possível e com as **menores taxas**.", '', 1200);
                    const optsPerfil = `
                        <div class="options-group flex flex-col gap-2 mt-1 w-full max-w-[280px]">
                            <button data-val="INSS" onclick="handleUserSelection('INSS', '👴 Aposentado/Pensionista INSS', 'perfil')" class="option-btn text-left p-3.5 bg-white border border-blue-100 rounded-xl font-semibold text-sm text-slate-700 shadow-sm flex items-center gap-3 w-full"><div class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-lg"><i class="ph-fill ph-users"></i></div> Aposentado/Pensionista INSS</button>
                            <button data-val="BPC" onclick="handleUserSelection('BPC', '♿ Beneficiário BPC/LOAS', 'perfil')" class="option-btn text-left p-3.5 bg-white border border-blue-100 rounded-xl font-semibold text-sm text-slate-700 shadow-sm flex items-center gap-3 w-full"><div class="w-8 h-8 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center text-lg"><i class="ph-fill ph-wheelchair"></i></div> Beneficiário BPC/LOAS</button>
                            <button data-val="SIAPE" onclick="handleUserSelection('SIAPE', '🏛️ Servidor Público', 'perfil')" class="option-btn text-left p-3.5 bg-white border border-blue-100 rounded-xl font-semibold text-sm text-slate-700 shadow-sm flex items-center gap-3 w-full"><div class="w-8 h-8 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center text-lg"><i class="ph-fill ph-bank"></i></div> Servidor Público Federal</button>
                        </div>
                    `;
                    await sendBotMessage("Para iniciarmos, me confirme: **Qual é o seu perfil hoje?**", optsPerfil, 1200);
                    break;

                case 1:
                    const optsObj = `
                        <div class="options-group flex flex-col gap-2 mt-1 w-full max-w-[280px]">
                            <button data-val="NOVO" onclick="handleUserSelection('NOVO', '💰 Empréstimo Consignado Novo', 'objetivo')" class="option-btn text-left p-3.5 bg-white border border-blue-100 rounded-xl font-semibold text-sm text-slate-700 shadow-sm flex items-center gap-3 w-full"><div class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-lg"><i class="ph-fill ph-money"></i></div> Empréstimo Consignado</button>
                            <button data-val="CARTAO" onclick="handleUserSelection('CARTAO', '💳 Cartão Benefício', 'objetivo')" class="option-btn text-left p-3.5 bg-white border border-blue-100 rounded-xl font-semibold text-sm text-slate-700 shadow-sm flex items-center gap-3 w-full"><div class="w-8 h-8 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center text-lg"><i class="ph-fill ph-credit-card"></i></div> Cartão Benefício</button>
                            <button data-val="PORTABILIDADE" onclick="handleUserSelection('PORTABILIDADE', '🔄 Portabilidade', 'objetivo')" class="option-btn text-left p-3.5 bg-white border border-blue-100 rounded-xl font-semibold text-sm text-slate-700 shadow-sm flex items-center gap-3 w-full"><div class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center text-lg"><i class="ph-fill ph-arrows-left-right"></i></div> Portabilidade</button>
                        </div>
                    `;
                    await sendBotMessage("Entendido! E o que você busca fazer hoje?", optsObj, 1200);
                    break;

                case 2:
                    // Aqui renderizamos o simulador e o fluxo é PAUSADO até o usuário clicar em "Simular Agora" (que chama confirmSimulation())
                    await sendBotMessage("Ajuste o valor e o prazo como preferir no simulador abaixo:", renderSimulatorCard(), 1500);
                    break;

                case 3:
                    await sendBotMessage("Excelente escolha! Para registrarmos sua simulação e analisar as propostas de bancos concorrentes, preciso de alguns dados básicos.", '', 1000);
                    await sendBotMessage("Qual o seu **nome completo**?", '', 1200);
                    await waitForInput('nome', 'text', 'Digite seu nome...', val => val.length > 3, 'Por favor, digite seu nome completo');
                    break;

                case 4:
                    await sendBotMessage(`Prazer, **${state.data.nome}**! Agora preciso que me informe o seu **CPF** para checar a margem pré-aprovada.`, '', 1200);
                    await waitForInput('cpf', 'tel', '000.000.000-00', val => validarCPF(val), 'CPF inválido. Digite novamente.', maskCPF);
                    break;

                case 5:
                    await sendBotMessage("Perfeito! Por último, qual o seu **número de celular** para contato?", '', 1200);
                    await waitForInput('celular', 'tel', '(00) 00000-0000', val => val.length >= 14, 'Número inválido. Digite com o DDD.', maskPhone);
                    break;

                case 6:
                    await sendBotMessage("Analisando as propostas no nosso sistema...", '', 2000);
                    const linkWpp = `https://api.whatsapp.com/send?phone=${APP_CONFIG.whatsapp}&text=Olá Ana! Finalizei minha simulação no portal.%0A%0ANome: ${state.data.nome}%0ACPF: ${state.data.cpf}%0ATelefone: ${state.data.celular}%0APerfil: ${state.data.perfil}%0AObjetivo: ${state.data.objetivo}%0AValor Simulado: ${formatMoney(state.data.valor)} em ${state.data.prazo}x`;
                    const btnWpp = `
                        <div class="mt-2 w-full max-w-[280px]">
                            <a href="${linkWpp}" target="_blank" class="btn-whatsapp-pulse flex items-center justify-center gap-2 text-white font-bold py-4 px-6 rounded-2xl shadow-lg hover:opacity-95 transition-all text-base text-center">
                                <i class="ph-fill ph-whatsapp-logo text-2xl animate-bounce"></i> Falar com Atendente
                            </a>
                        </div>
                    `;
                    await sendBotMessage("🎉 **Ótima notícia!** Temos ofertas excelentes disponíveis de acordo com seu perfil.", btnWpp, 1500);
                    break;
            }
        }

        function resetApp() {
            messagesList.innerHTML = '';
            state = {
                step: 0,
                isTyping: false,
                data: { perfil: '', objetivo: '', valor: 5000, prazo: 84, nome: '', cpf: '', celular: '', banco: '', formaRecebimento: '' }
            };
            executeStep();
        }

        // Inicializa o chat no carregamento da página
        document.addEventListener('DOMContentLoaded', () => {
            executeStep();
        });
    </script>
